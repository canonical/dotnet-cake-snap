name: CI snap

# CI for the snap packaging and integration tests of the snap. Runs on every PR to main.
#
# Steps:
#   1. Builds the snap (latest stable Cake release) on amd64 + arm64.
#   2. Installs it locally (--dangerous) and runs the integration tests in tests/.
#   3. Uploads the snap artifact for inspection (never publishes to the store).
#
# The edge channel is maintained exclusively by build-edge-snap.yml (daily),
# which tracks the upstream develop branch. This workflow only validates
# changes to the snap packaging itself.
#
# Complements the scheduled workflows:
#   - build-stable-snap.yml : tracks new upstream Cake releases  -> stable
#   - build-edge-snap.yml   : tracks upstream develop branch     -> edge

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build snap (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: [self-hosted, large, noble, X64]
          - arch: arm64
            runner: [self-hosted, large, noble, ARM64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make curl jq

      - name: Generate snapcraft.yaml (latest stable Cake release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make fetch-version generate-snapcraft

      - name: Build snap
        id: snapcraft
        uses: canonical/action-build@v1
        with:
          snapcraft-args: "pack --verbose"

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: snap-${{ matrix.arch }}
          path: ${{ steps.snapcraft.outputs.snap }}

      - name: Install snap
        run: |
          sudo snap remove dotnet-cake || true
          sudo snap install ${{ steps.snapcraft.outputs.snap }} --dangerous --classic

      - name: Install .NET SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y dotnet-sdk-10.0

      - name: Run integration tests
        working-directory: tests
        run: |
          dotnet-cake build.cake --verbosity=Diagnostic
